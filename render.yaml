services:
  - type: web
    name: yashoda-properties
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_URL
        value: sqlite:///./app.db
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: FRONTEND_DIST_PATH
        value: /app/frontend/dist
    healthCheckPath: /health
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
